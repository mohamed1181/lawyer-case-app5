name: lawyer_case_app
description: تطبيق إدارة القضايا القانونية - نسخة احترافية
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # تخزين محلي سريع (NoSQL) - لا يحتاج خادم، يعمل بدون انترنت بالكامل
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # إدارة الحالة (State Management)
  provider: ^6.1.2

  # تنسيق التواريخ بالعربية + إشعارات الجلسات
  intl: ^0.19.0
  flutter_local_notifications: ^17.2.2

  # أيقونات وتصميم
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # hive_generator + build_runner اختياريان فقط لو رغبت بإعادة توليد TypeAdapter تلقائياً
  # هنا اكتفينا بكتابته يدوياً لتفادي الحاجة لـ build_runner

flutter:
  uses-material-design: true
